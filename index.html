<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
:root{--bg:#f7f7f5;--surface:#ffffff;--surface2:#f0f0ee;--border:#e0e0dc;--text1:#1a1a18;--text2:#6b6b65;--text3:#a0a09a;--azul:#2563eb;--azul-bg:#eff6ff;--verde:#16a34a;--verde-bg:#f0fdf4;--rojo:#dc2626;--rojo-bg:#fef2f2;--amarillo:#d97706;--amarillo-bg:#fffbeb;--violeta:#7c3aed;--violeta-bg:#f5f3ff;--radius:10px;--shadow:0 1px 4px rgba(0,0,0,0.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text1);min-height:100vh}
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;height:52px;position:sticky;top:0;z-index:100;gap:0}
.nav-brand{font-weight:800;font-size:16px;margin-right:20px;white-space:nowrap}.nav-brand span{color:var(--azul)}
.nav-tab{padding:0 14px;height:52px;display:flex;align-items:center;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap}
.nav-tab:hover{color:var(--text1)}.nav-tab.active{color:var(--azul);border-bottom-color:var(--azul)}
.page{max-width:1100px;margin:0 auto;padding:24px 16px}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.page-title{font-size:22px;font-weight:800}.page-sub{font-size:14px;color:var(--text2);margin-top:2px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s}
.btn-primary{background:var(--azul);color:white}.btn-primary:hover{background:#1d4ed8}
.btn-outline{background:transparent;color:var(--text1);border:1.5px solid var(--border)}.btn-outline:hover{background:var(--surface2)}
.btn-sm{padding:5px 12px;font-size:13px}
.btn-icon{padding:6px 8px;background:transparent;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:15px;color:var(--text2)}.btn-icon:hover{background:var(--surface2)}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px}
.form-input,.form-select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;background:var(--surface);color:var(--text1);outline:none;transition:border 0.15s}
.form-input:focus,.form-select:focus{border-color:var(--azul)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--surface);border-radius:14px;width:100%;max-width:580px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:17px;font-weight:700}
.modal-close{background:none;border:none;font-size:22px;color:var(--text2);cursor:pointer;line-height:1}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;background:var(--surface)}
table{width:100%;border-collapse:collapse}
th{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:14px}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.precio-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}
.precio-item:last-child{border-bottom:none}
.precio-costo{color:var(--text1);font-weight:700}
.precio-greguera{color:var(--azul);font-weight:700}
.precio-balbi{color:var(--verde);font-weight:700}
.precio-sucati{color:var(--amarillo);font-weight:700}
.precio-venta{color:var(--violeta);font-weight:700}
.pct-tag{font-size:10px;font-weight:600;color:var(--text3)}
.sep{height:1px;background:var(--border);margin:16px 0}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-size:18px;font-weight:700;color:var(--text1);margin-bottom:6px}
.loading{text-align:center;padding:40px;color:var(--text2)}
.detalle-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
.caratula{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;background:var(--bg);position:relative}
.caratula-logo{font-size:38px;font-weight:800;margin-bottom:6px}
.caratula-logo span{color:var(--azul)}
.caratula-sub{font-size:15px;color:var(--text2);margin-bottom:28px}
.caratula-estaciones{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.estacion-card{width:150px;height:150px;border-radius:16px;border:1.5px solid var(--border);background:var(--surface);box-shadow:var(--shadow);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;font-size:40px;transition:all 0.15s;font-family:inherit}
.estacion-card:hover{border-color:var(--azul);transform:translateY(-2px)}
.estacion-card div{font-size:15px;font-weight:700;color:var(--text1)}
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.tag-azul{background:var(--azul-bg);color:var(--azul)}
@media(max-width:780px){.detalle-grid{grid-template-columns:1fr}}
@media(max-width:600px){.form-row{grid-template-columns:1fr}.nav-tab{padding:0 10px;font-size:12px}}
</style>
</head>

<script type="text/babel">
const{createClient}=supabase
const sb=createClient('https://dptfgqdybjuhsehyhuyy.supabase.co',window.SUPABASE_ANON_KEY)
const{useState,useEffect}=React
const fmt=v=>v!=null?'$'+Math.round(v).toLocaleString('es-AR'):'—'
const round500=v=>Math.round(v/500)*500

async function getTemporadas(){const{data}=await sb.schema('costos').from('temporadas').select('*');return data||[]}
async function getConfig(id){const{data}=await sb.schema('costos').from('config').select('*').eq('temporada_id',id).limit(1);return data?.[0]||null}
async function getPrecios(tabla,id){const{data}=await sb.schema('costos').from(tabla).select('*').eq('temporada_id',id);return data||[]}
async function getArticulos(id){const{data}=await sb.schema('costos').from('articulos').select('*').eq('temporada_id',id);return(data||[]).sort((a,b)=>a.codigo.localeCompare(b.codigo))}
async function getArticuloDetalle(id){
  const[{data:telas},{data:avios},{data:percha}]=await Promise.all([
    sb.schema('costos').from('articulo_telas').select('*,precios_tela(*)').eq('articulo_id',id),
    sb.schema('costos').from('articulo_avios').select('*,precios_avios(*)').eq('articulo_id',id),
    sb.schema('costos').from('articulo_percha').select('*,precios_perchas(*)').eq('articulo_id',id),
  ])
  return{telas:telas||[],avios:avios||[],percha:percha||[]}
}
function calcPrecios(det,confeccion,config){
  const t=(det.telas||[]).reduce((s,t)=>s+(t.cantidad*(t.precios_tela?.precio||0)),0)
  const a=(det.avios||[]).reduce((s,a)=>s+(a.cantidad*(a.precios_avios?.precio||0)),0)
  const p=(det.percha||[]).reduce((s,p)=>s+(p.cantidad*(p.precios_perchas?.precio||0)),0)
  const corte=config?.precio_corte||0
  const costo=t+a+p+corte+(confeccion||0)
  const gr=(config?.margen_greguera||100)/100
  const ba=(config?.margen_balbi||50)/100
  const su=(config?.descuento_sucati||15)/100
  const pv=(config?.margen_propio??config?.margen_greguera??100)/100
  return{costo,greguera:costo*(1+gr),balbi:costo*(1+ba),sucati:costo*(1+gr)*(1-su),precioVenta:round500(costo*(1+pv)),totalTela:t,totalAvios:a,totalPercha:p,corte}
}

function detectarEstacion(nombre){
  const n=(nombre||'').toLowerCase()
  if(n.includes('invierno'))return 'invierno'
  if(n.includes('verano'))return 'verano'
  return 'otra'
}

function App(){
  const[pantalla,setPantalla]=useState('caratula')
  const[estacion,setEstacion]=useState(null)
  const[tab,setTab]=useState('articulos')
  const[temporadas,setTemporadas]=useState([])
  const[temporada,setTemporada]=useState(null)
  const[config,setConfig]=useState(null)
  const[loading,setLoading]=useState(true)
  const[mTemp,setMTemp]=useState(false)
  const[mCambiar,setMCambiar]=useState(false)

  useEffect(()=>{
    getTemporadas().then(ts=>{setTemporadas(ts);setLoading(false)})
  },[])

  async function elegirTemporada(t){
    setTemporada(t)
    setConfig(await getConfig(t.id))
    setPantalla('app')
    setMCambiar(false)
    setMTemp(false)
  }

  async function crearTemporada(nombre){
    await sb.schema('costos').from('temporadas').insert({nombre,activa:false})
    const ts=await getTemporadas()
    setTemporadas(ts)
    const nueva=ts.find(t=>t.nombre===nombre)
    if(nueva)elegirTemporada(nueva)
  }

  async function elegirEstacion(est){
    setEstacion(est)
    const lista=temporadas.filter(t=>detectarEstacion(t.nombre)===est)
    if(lista.length===1){
      elegirTemporada(lista[0])
    } else if(lista.length===0){
      setMTemp(true)
    } else {
      // multiple → show picker inline on carátula
      setPantalla('picker')
    }
  }

  if(loading)return React.createElement('div',{className:'loading'},'⏳ Cargando...')

  if(pantalla==='caratula'){
    return(
      <div className="caratula">
        <div className="caratula-logo">Criterio <span>Costos</span></div>
        <div className="caratula-sub">Elegí la temporada</div>
        <div className="caratula-estaciones">
          <button className="estacion-card" onClick={()=>elegirEstacion('invierno')}>
            <span>❄️</span><div>Invierno</div>
          </button>
          <button className="estacion-card" onClick={()=>elegirEstacion('verano')}>
            <span>☀️</span><div>Verano</div>
          </button>
        </div>
        {mTemp&&<ModalNuevaTemp sugerido={estacion==='invierno'?'Invierno ':'Verano '} onClose={()=>setMTemp(false)} onSave={crearTemporada}/>}
      </div>
    )
  }

  if(pantalla==='picker'){
    const lista=temporadas.filter(t=>detectarEstacion(t.nombre)===estacion)
    return(
      <div className="caratula">
        <button onClick={()=>setPantalla('caratula')} style={{position:'absolute',top:18,left:18,display:'flex',alignItems:'center',gap:6,color:'var(--text2)',background:'none',border:'none',cursor:'pointer',fontSize:14}}>← Volver</button>
        <div className="caratula-logo" style={{fontSize:26,marginBottom:4}}>{estacion==='invierno'?'❄️ Invierno':'☀️ Verano'}</div>
        <div className="caratula-sub">Elegí una temporada o creá una nueva</div>
        <div style={{display:'flex',flexDirection:'column',gap:10,width:'100%',maxWidth:360}}>
          {lista.map(t=>(
            <button key={t.id} className="btn btn-outline" style={{minHeight:48,fontSize:15}} onClick={()=>elegirTemporada(t)}>{t.nombre}</button>
          ))}
          <button className="btn btn-primary" style={{minHeight:48}} onClick={()=>setMTemp(true)}>+ Nueva temporada</button>
        </div>
        {mTemp&&<ModalNuevaTemp sugerido={estacion==='invierno'?'Invierno ':'Verano '} onClose={()=>setMTemp(false)} onSave={crearTemporada}/>}
      </div>
    )
  }

  const tabs=['articulos','lista','telas','avios','perchas','config']
  const tabLabel={articulos:'📦 Artículos',lista:'🏷️ Lista',telas:'🧵 Telas',avios:'🪡 Avíos',perchas:'🧲 Perchas',config:'⚙️ Config'}

  return(
    <div>
      <nav className="nav">
        <div className="nav-brand" style={{cursor:'pointer'}} onClick={()=>setPantalla('caratula')}>Criterio <span>Costos</span></div>
        {tabs.map(t=>(
          <div key={t} className={`nav-tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>{tabLabel[t]}</div>
        ))}
        <div style={{marginLeft:'auto',position:'relative'}}>
          <span className="tag tag-azul" style={{cursor:'pointer'}} onClick={()=>setMCambiar(v=>!v)}>{temporada?.nombre} ▾</span>
          {mCambiar&&(
            <div style={{position:'absolute',right:0,top:'calc(100% + 8px)',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,boxShadow:'0 4px 20px rgba(0,0,0,0.12)',minWidth:230,zIndex:200,padding:8}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',padding:'4px 10px 8px'}}>
                {estacion==='invierno'?'❄️ Temporadas de Invierno':'☀️ Temporadas de Verano'}
              </div>
              {temporadas.filter(t=>detectarEstacion(t.nombre)===estacion).map(t=>(
                <div key={t.id} onClick={()=>elegirTemporada(t)}
                  style={{padding:'9px 12px',borderRadius:7,cursor:'pointer',fontWeight:t.id===temporada?.id?700:400,background:t.id===temporada?.id?'var(--azul-bg)':'transparent',color:t.id===temporada?.id?'var(--azul)':'var(--text1)',fontSize:14}}>{t.nombre}</div>
              ))}
              <div style={{borderTop:'1px solid var(--border)',marginTop:6,paddingTop:6}}>
                <div onClick={()=>{setMCambiar(false);setMTemp(true)}} style={{padding:'9px 12px',borderRadius:7,cursor:'pointer',color:'var(--azul)',fontWeight:600,fontSize:14}}>+ Nueva temporada</div>
                <div onClick={()=>{setMCambiar(false);setPantalla('caratula')}} style={{padding:'9px 12px',borderRadius:7,cursor:'pointer',color:'var(--text2)',fontSize:14}}>↩ Cambiar estación</div>
              </div>
            </div>
          )}
          {mTemp&&<ModalNuevaTemp sugerido={estacion==='invierno'?'Invierno ':'Verano '} onClose={()=>setMTemp(false)} onSave={crearTemporada}/>}
        </div>
      </nav>
      {!temporada?<div className="empty"><div className="empty-title">Sin temporadas</div></div>
        :tab==='articulos'?<ArticulosPage temporada={temporada} config={config}/>
        :tab==='lista'?<ListaPreciosPage temporada={temporada} config={config}/>
        :tab==='telas'?<PreciosPage tipo="precios_tela" titulo="Precios de Telas" icono="🧵" temporada={temporada}/>
        :tab==='avios'?<PreciosPage tipo="precios_avios" titulo="Precios de Avíos" icono="🪡" temporada={temporada}/>
        :tab==='perchas'?<PreciosPage tipo="precios_perchas" titulo="Precios de Perchas" icono="🧲" temporada={temporada}/>
        :<ConfigPage temporada={temporada} config={config} onSave={setConfig} temporadas={temporadas} onTemporadas={ts=>{setTemporadas(ts)}}/>
      }
    </div>
  )
}

function ArticulosPage({temporada,config}){
  const[articulos,setArticulos]=useState([])
  const[loading,setLoading]=useState(true)
  const[busqueda,setBusqueda]=useState('')
  const[modalNuevo,setModalNuevo]=useState(false)
  const[seleccionado,setSeleccionado]=useState(null)

  useEffect(()=>{cargar()},[temporada.id])

  async function cargar(){
    setLoading(true)
    const arts=await getArticulos(temporada.id)
    const con=await Promise.all(arts.map(async a=>{
      const det=await getArticuloDetalle(a.id)
      return{...a,detalle:det,precios:calcPrecios(det,a.confeccion,config)}
    }))
    setArticulos(con)
    setLoading(false)
  }

  const esIncompleto=a=>{
    const sinTelas=!a.detalle?.telas?.length
    const telaCero=a.detalle?.telas?.some(t=>!t.cantidad||t.cantidad===0)
    const sinConf=!a.confeccion||a.confeccion===0
    const sinFoto=!a.foto_url
    return{incompleto:sinTelas||telaCero||sinConf||sinFoto,sinTelas,telaCero,sinConf,sinFoto}
  }
  const incompletos=articulos.filter(a=>esIncompleto(a).incompleto)
  const[verIncompletos,setVerIncompletos]=useState(true)

  const filtrados=articulos.filter(a=>!busqueda||a.codigo.toLowerCase().includes(busqueda.toLowerCase())||(a.descripcion||'').toLowerCase().includes(busqueda.toLowerCase()))

  const ultimoNumerico=React.useMemo(()=>{
    const guardado=localStorage.getItem(`ultimoCodigo_${temporada.id}`)
    return guardado?parseInt(guardado):null
  },[temporada.id])

  if(seleccionado)return <ArticuloDetalle art={seleccionado} temporada={temporada} config={config} onBack={()=>{setSeleccionado(null);cargar()}}/>

  return(
    <div className="page">
      <div className="page-header">
        <div>
          <div className="page-title">Artículos</div>
          <div className="page-sub">
            {temporada.nombre} · {articulos.length} artículos
            {ultimoNumerico&&<span style={{marginLeft:10,color:'var(--azul)',fontWeight:700}}>· último código: {ultimoNumerico} → siguiente: {ultimoNumerico+1}</span>}
          </div>
        </div>
        <button className="btn btn-primary" onClick={()=>setModalNuevo(true)}>+ Nuevo artículo</button>
      </div>

      {!loading&&incompletos.length>0&&(
        <div style={{marginBottom:16,border:'1.5px solid #fbbf24',borderRadius:10,overflow:'hidden'}}>
          <div onClick={()=>setVerIncompletos(v=>!v)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',background:'#fffbeb',cursor:'pointer'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:16}}>⚠️</span>
              <span style={{fontWeight:700,fontSize:14,color:'#92400e'}}>Artículos incompletos</span>
              <span style={{background:'#fbbf24',color:'#fff',borderRadius:20,fontSize:11,fontWeight:700,padding:'2px 8px'}}>{incompletos.length}</span>
            </div>
            <span style={{color:'#92400e',fontSize:13}}>{verIncompletos?'▲ Ocultar':'▼ Ver'}</span>
          </div>
          {verIncompletos&&(
            <div style={{background:'#fff'}}>
              {incompletos.map((a,i)=>{
                const {sinTelas,telaCero,sinConf,sinFoto}=esIncompleto(a)
                const motivos=[]
                if(sinTelas)motivos.push('sin tela')
                if(telaCero)motivos.push('cantidad de tela en 0')
                if(sinConf)motivos.push('sin confección')
                if(sinFoto)motivos.push('sin foto')
                return(
                  <div key={a.id} onClick={()=>setSeleccionado(a)}
                    style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',borderTop:'1px solid #fde68a',cursor:'pointer',background:i%2===0?'#fffdf5':'#fff'}}>
                    <div>
                      <span style={{fontWeight:700,fontSize:14}}>{a.codigo}</span>
                      <span style={{fontSize:13,color:'var(--text2)',marginLeft:10}}>{a.descripcion}</span>
                    </div>
                    <div style={{display:'flex',gap:6,alignItems:'center'}}>
                      {motivos.map(m=><span key={m} style={{fontSize:11,background:'#fef3c7',color:'#92400e',padding:'2px 8px',borderRadius:20,fontWeight:600}}>{m}</span>)}
                      <span style={{color:'var(--azul)',fontSize:16}}>›</span>
                    </div>
                  </div>
                )
              })}
            </div>
          )}
        </div>
      )}

      <input className="form-input" placeholder="🔍 Buscar por código o descripción..." value={busqueda} onChange={e=>setBusqueda(e.target.value)} style={{marginBottom:16}}/>
      {loading?<div className="loading">⏳ Cargando...</div>:filtrados.length===0?(
        <div className="empty">
          <div className="empty-icon">📦</div>
          <div className="empty-title">{busqueda?'Sin resultados':'Sin artículos todavía'}</div>
          {!busqueda&&<button className="btn btn-primary" style={{marginTop:16}} onClick={()=>setModalNuevo(true)}>+ Crear primer artículo</button>}
        </div>
      ):(
        <div className="card" style={{overflow:'hidden'}}>
          <table>
            <thead><tr>
              <th>Artículo</th>
              <th style={{textAlign:'right'}}>Costo</th>
              <th style={{textAlign:'right'}}>Precio Venta<div className="pct-tag">@{config?.margen_propio??config?.margen_greguera??100}%</div></th>
              <th style={{textAlign:'right'}}>G. Reguera<div className="pct-tag">@{config?.margen_greguera??100}%</div></th>
              <th style={{textAlign:'right'}}>Balbi<div className="pct-tag">@{config?.margen_balbi??50}%</div></th>
              <th style={{textAlign:'right'}}>Sucati<div className="pct-tag">-{config?.descuento_sucati??15}%</div></th>
              <th></th>
            </tr></thead>
            <tbody>
              {filtrados.map(a=>(
                <tr key={a.id} style={{cursor:'pointer'}} onClick={()=>setSeleccionado(a)}>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      {a.foto_url
                        ?<img src={a.foto_url} alt="" style={{width:40,height:40,borderRadius:6,objectFit:'cover'}}/>
                        :<div style={{width:40,height:40,borderRadius:6,background:'var(--surface2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>👕</div>
                      }
                      <div>
                        <div style={{fontWeight:700}}>{a.codigo}</div>
                        <div style={{fontSize:12,color:'var(--text2)'}}>{a.descripcion}</div>
                      </div>
                    </div>
                  </td>
                  <td style={{textAlign:'right'}}><span className="precio-costo">{fmt(a.precios?.costo)}</span></td>
                  <td style={{textAlign:'right'}}><span className="precio-venta">{fmt(a.precios?.precioVenta)}</span></td>
                  <td style={{textAlign:'right'}}><span className="precio-greguera">{fmt(a.precios?.greguera)}</span></td>
                  <td style={{textAlign:'right'}}><span className="precio-balbi">{fmt(a.precios?.balbi)}</span></td>
                  <td style={{textAlign:'right'}}><span className="precio-sucati">{fmt(a.precios?.sucati)}</span></td>
                  <td><span style={{color:'var(--azul)',fontSize:18}}>›</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
      {modalNuevo&&<ModalNuevoArt temporada={temporada} articulos={articulos} onClose={()=>setModalNuevo(false)} onSave={()=>{setModalNuevo(false);cargar()}}/>}
    </div>
  )
}

function ArticuloDetalle({art,temporada,config,onBack}){
  const[det,setDet]=useState({telas:[],avios:[],percha:[]})
  const[conf,setConf]=useState(art.confeccion||0)
  const[codigo,setCodigo]=useState(art.codigo)
  const[descripcion,setDescripcion]=useState(art.descripcion||'')
  const[notas_taller,setNotasTaller]=useState(art.notas_taller||'')
  const[precios,setPrecios]=useState(art.precios||{})
  const[loading,setLoading]=useState(true)
  const[editConf,setEditConf]=useState(false)
  const[confInput,setConfInput]=useState(String(art.confeccion||0))
  const[editCodigo,setEditCodigo]=useState(false)
  const[codigoInput,setCodigoInput]=useState(art.codigo)
  const[editDesc,setEditDesc]=useState(false)
  const[descInput,setDescInput]=useState(art.descripcion||'')
  const[editTaller,setEditTaller]=useState(false)
  const[tallerInput,setTallerInput]=useState(art.notas_taller||'')
  const[mTela,setMTela]=useState(false)
  const[mAvio,setMAvio]=useState(false)
  const[mPercha,setMPercha]=useState(false)
  const[editandoCantidad,setEditandoCantidad]=useState(null)

  useEffect(()=>{cargar()},[art.id])
  useEffect(()=>{setPrecios(calcPrecios(det,conf,config))},[det,conf,config])

  async function cargar(){
    setLoading(true)
    const d=await getArticuloDetalle(art.id)
    setDet(d)
    setLoading(false)
  }
  async function guardarConf(){
    const v=Number(confInput)||0
    await sb.schema('costos').from('articulos').update({confeccion:v}).eq('id',art.id)
    setConf(v);setEditConf(false)
  }
  async function guardarCodigo(){
    const v=codigoInput.trim()
    if(!v)return
    await sb.schema('costos').from('articulos').update({codigo:v}).eq('id',art.id)
    setCodigo(v);setEditCodigo(false)
  }
  async function guardarDescripcion(){
    const v=descInput.trim()
    await sb.schema('costos').from('articulos').update({descripcion:v}).eq('id',art.id)
    setDescripcion(v);setEditDesc(false)
  }
  async function guardarTaller(){
    const v=tallerInput.trim()
    await sb.schema('costos').from('articulos').update({notas_taller:v||null}).eq('id',art.id)
    setNotasTaller(v);setEditTaller(false)
  }
  async function guardarCantidad(tabla,id,valor){
    const v=Number(valor)||0
    await sb.schema('costos').from(tabla).update({cantidad:v}).eq('id',id)
    setEditandoCantidad(null)
    cargar()
  }
  async function delTela(id){await sb.schema('costos').from('articulo_telas').delete().eq('id',id);cargar()}
  async function delAvio(id){await sb.schema('costos').from('articulo_avios').delete().eq('id',id);cargar()}
  async function delPercha(id){await sb.schema('costos').from('articulo_percha').delete().eq('id',id);cargar()}

  async function eliminarArticulo(){
    if(!confirm(`¿Eliminar el artículo ${codigo}? Esta acción no se puede deshacer.`))return
    await sb.schema('costos').from('articulo_telas').delete().eq('articulo_id',art.id)
    await sb.schema('costos').from('articulo_avios').delete().eq('articulo_id',art.id)
    await sb.schema('costos').from('articulo_percha').delete().eq('articulo_id',art.id)
    await sb.schema('costos').from('articulos').delete().eq('id',art.id)
    onBack()
  }

  return(
    <div className="page" style={{padding:'14px 16px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:6,color:'var(--text2)',background:'none',border:'none',cursor:'pointer',fontSize:14}}>← Volver</button>
        <button onClick={eliminarArticulo} style={{display:'flex',alignItems:'center',gap:6,color:'var(--rojo)',background:'none',border:'1.5px solid var(--rojo)',borderRadius:8,padding:'6px 12px',cursor:'pointer',fontSize:13,fontWeight:600}}>🗑 Eliminar artículo</button>
      </div>

      <div style={{display:'flex',gap:14,marginBottom:14,alignItems:'flex-start'}}>
        <FotoUp artId={art.id} url={art.foto_url} onSave={cargar}/>
        <div style={{flex:1,minWidth:0}}>
          {editCodigo?(
            <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:4}}>
              <input className="form-input" value={codigoInput} onChange={e=>setCodigoInput(e.target.value)} style={{fontSize:17,fontWeight:800,padding:'4px 8px',width:150}} autoFocus/>
              <button className="btn btn-sm btn-primary" onClick={guardarCodigo}>✓</button>
              <button className="btn btn-sm btn-outline" onClick={()=>{setCodigoInput(codigo);setEditCodigo(false)}}>✕</button>
            </div>
          ):(
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:2}}>
              <div style={{fontSize:22,fontWeight:800}}>{codigo}</div>
              <button className="btn-icon" onClick={()=>setEditCodigo(true)}>✏️</button>
            </div>
          )}
          {editDesc?(
            <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:6}}>
              <input className="form-input" value={descInput} onChange={e=>setDescInput(e.target.value)} style={{fontSize:13,padding:'4px 8px'}} autoFocus/>
              <button className="btn btn-sm btn-primary" onClick={guardarDescripcion}>✓</button>
              <button className="btn btn-sm btn-outline" onClick={()=>{setDescInput(descripcion);setEditDesc(false)}}>✕</button>
            </div>
          ):(
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
              <div style={{fontSize:14,color:'var(--text2)'}}>{descripcion||'Sin descripción'}</div>
              <button className="btn-icon" onClick={()=>setEditDesc(true)}>✏️</button>
            </div>
          )}
          {editTaller?(
            <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:6}}>
              <input className="form-input" value={tallerInput} onChange={e=>setTallerInput(e.target.value)}
                placeholder="Ej: Taller Marta, Eva..." style={{fontSize:13,padding:'4px 8px'}} autoFocus/>
              <button className="btn btn-sm btn-primary" onClick={guardarTaller}>✓</button>
              <button className="btn btn-sm btn-outline" onClick={()=>{setTallerInput(notas_taller);setEditTaller(false)}}>✕</button>
            </div>
          ):(
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
              <span style={{fontSize:12}}>🏭</span>
              <span style={{fontSize:13,color:notas_taller?'var(--text1)':'var(--text3)',fontStyle:notas_taller?'normal':'italic'}}>
                {notas_taller||'Sin talleres asignados'}
              </span>
              <button className="btn-icon" onClick={()=>setEditTaller(true)}>✏️</button>
            </div>
          )}
          <span className="tag tag-azul">{temporada.nombre}</span>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(96px,1fr))',gap:8,marginBottom:14}}>
        {[
          {l:'Costo',v:precios.costo,c:'precio-costo'},
          {l:'Precio Venta',v:precios.precioVenta,c:'precio-venta',pct:'@'+(config?.margen_propio??config?.margen_greguera??100)+'%'},
          {l:'G. Reguera',v:precios.greguera,c:'precio-greguera',pct:'@'+(config?.margen_greguera??100)+'%'},
          {l:'Balbi',v:precios.balbi,c:'precio-balbi',pct:'@'+(config?.margen_balbi??50)+'%'},
          {l:'Sucati',v:precios.sucati,c:'precio-sucati',pct:'-'+(config?.descuento_sucati??15)+'%'},
        ].map(p=>(
          <div key={p.l} className="card" style={{padding:'8px 10px'}}>
            <div style={{fontSize:10,fontWeight:600,color:'var(--text2)',textTransform:'uppercase',marginBottom:2}}>{p.l}</div>
            <div className={p.c} style={{fontSize:16,fontWeight:800}}>{fmt(p.v)}</div>
            {p.pct&&<div className="pct-tag">{p.pct}</div>}
          </div>
        ))}
      </div>

      {loading?<div className="loading">⏳ Cargando...</div>:(
        <div className="detalle-grid">
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div className="card">
              <div style={{padding:'10px 14px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <b style={{fontSize:14}}>🧵 Telas</b><button className="btn btn-sm btn-outline" onClick={()=>setMTela(true)}>+ Agregar</button>
              </div>
              {det.telas.length===0?<div style={{padding:14,textAlign:'center',color:'var(--text2)',fontSize:13}}>Sin telas</div>
                :det.telas.map(t=>(
                <div key={t.id} className="precio-item">
                  <div><div style={{fontWeight:600,fontSize:13}}>{t.precios_tela?.nombre}</div>
                    {!(editandoCantidad?.tabla==='articulo_telas'&&editandoCantidad?.id===t.id)&&
                      <div style={{fontSize:11,color:'var(--text2)'}}>{t.cantidad} {t.precios_tela?.unidad||'kg'} × {fmt(t.precios_tela?.precio)}</div>}
                  </div>
                  {editandoCantidad?.tabla==='articulo_telas'&&editandoCantidad?.id===t.id?(
                    <EditInline valor={t.cantidad} onSave={v=>guardarCantidad('articulo_telas',t.id,v)} onCancel={()=>setEditandoCantidad(null)}/>
                  ):(
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <b style={{fontSize:13}}>{fmt(t.cantidad*(t.precios_tela?.precio||0))}</b>
                      <button className="btn-icon" onClick={()=>setEditandoCantidad({tabla:'articulo_telas',id:t.id})}>✏️</button>
                      <button className="btn-icon" onClick={()=>delTela(t.id)}>🗑</button>
                    </div>
                  )}
                </div>
              ))}
              <div style={{padding:'7px 14px',background:'var(--surface2)',fontSize:12,fontWeight:700,display:'flex',justifyContent:'space-between'}}>
                <span>Total telas</span><span>{fmt(precios.totalTela)}</span>
              </div>
            </div>

            <div className="card">
              <div style={{padding:'10px 14px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <b style={{fontSize:14}}>🪡 Avíos</b><button className="btn btn-sm btn-outline" onClick={()=>setMAvio(true)}>+ Agregar</button>
              </div>
              {det.avios.length===0?<div style={{padding:14,textAlign:'center',color:'var(--text2)',fontSize:13}}>Sin avíos</div>
                :det.avios.map(a=>(
                <div key={a.id} className="precio-item">
                  <div><div style={{fontWeight:600,fontSize:13}}>{a.precios_avios?.nombre}</div>
                    {!(editandoCantidad?.tabla==='articulo_avios'&&editandoCantidad?.id===a.id)&&
                      <div style={{fontSize:11,color:'var(--text2)'}}>{a.cantidad} × {fmt(a.precios_avios?.precio)}</div>}
                  </div>
                  {editandoCantidad?.tabla==='articulo_avios'&&editandoCantidad?.id===a.id?(
                    <EditInline valor={a.cantidad} onSave={v=>guardarCantidad('articulo_avios',a.id,v)} onCancel={()=>setEditandoCantidad(null)}/>
                  ):(
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <b style={{fontSize:13}}>{fmt(a.cantidad*(a.precios_avios?.precio||0))}</b>
                      <button className="btn-icon" onClick={()=>setEditandoCantidad({tabla:'articulo_avios',id:a.id})}>✏️</button>
                      <button className="btn-icon" onClick={()=>delAvio(a.id)}>🗑</button>

                <span>Total avíos</span><span>{fmt(precios.totalAvios)}</span>

              <span style={{fontWeight:600,fontSize:13}}>Corte</span>
              <b style={{fontSize:13}}>{fmt(config?.precio_corte||0)}</b>
            </div>
            <div className="precio-item">
              <div><div style={{fontWeight:600,fontSize:13}}>Confección</div><div style={{fontSize:10,color:'var(--text3)'}}>manual por artículo</div></div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                {editConf?(
                  <>
                    <input type="number" value={confInput} onChange={e=>setConfInput(e.target.value)}

                </div>
                {editandoCantidad?.tabla==='articulo_percha'&&editandoCantidad?.id===p.id?(
                  <EditInline valor={p.cantidad} onSave={v=>guardarCantidad('articulo_percha',p.id,v)} onCancel={()=>setEditandoCantidad(null)}/>
                ):(
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <b style={{fontSize:13}}>{fmt(p.cantidad*(p.precios_perchas?.precio||0))}</b>
                    <button className="btn-icon" onClick={()=>setEditandoCantidad({tabla:'articulo_percha',id:p.id})}>✏️</button>
                    <button className="btn-icon" onClick={()=>delPercha(p.id)}>🗑</button>
                  </div>
                )}

            ))}
            <div style={{padding:'9px 14px',background:'var(--surface2)',fontWeight:800,display:'flex',justifyContent:'space-between',borderTop:'1px solid var(--border)'}}>
              <span style={{fontSize:13}}>COSTO TOTAL</span><span style={{fontSize:16}}>{fmt(precios.costo)}</span>
            </div>
          </div>
        </div>
      )}
      {mTela&&<ModalAdd tipo="tela" artId={art.id} tempId={temporada.id} onClose={()=>setMTela(false)} onSave={()=>{setMTela(false);cargar()}}/>}
      {mAvio&&<ModalAdd tipo="avio" artId={art.id} tempId={temporada.id} onClose={()=>setMAvio(false)} onSave={()=>{setMAvio(false);cargar()}}/>}
      {mPercha&&<ModalAdd tipo="percha" artId={art.id} tempId={temporada.id} onClose={()=>setMPercha(false)} onSave={()=>{setMPercha(false);cargar()}}/>}
    </div>
  )
}

function FotoUp({artId,url,onSave}){
  const[subiendo,setSubiendo]=useState(false)
  const[u,setU]=useState(url)
  const[err,setErr]=useState('')
  const[grande,setGrande]=useState(false)
  async function subir(e){
    const f=e.target.files[0];if(!f)return
    setSubiendo(true);setErr('')
    const ext=f.name.split('.').pop()
    const path=`${artId}-${Date.now()}.${ext}`
    const{error}=await sb.storage.from('fotos-costos').upload(path,f,{upsert:true})
    if(error){
      setErr(error.message||'Error al subir')
    } else {
      const{data}=sb.storage.from('fotos-costos').getPublicUrl(path)
      await sb.schema('costos').from('articulos').update({foto_url:data.publicUrl}).eq('id',artId)
      setU(data.publicUrl);onSave()
    }
    setSubiendo(false)
  }
  return(
    <div>
      {grande&&(
        <div onClick={()=>setGrande(false)} style={{position:'fixed',top:0,left:0,width:'100vw',height:'100vh',background:'rgba(0,0,0,0.85)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',cursor:'zoom-out'}}>
          <img src={u} alt="" style={{maxWidth:'90vw',maxHeight:'90vh',borderRadius:12,objectFit:'contain',boxShadow:'0 8px 40px rgba(0,0,0,0.5)'}}/>
          <div style={{position:'absolute',top:20,right:24,color:'#fff',fontSize:28,fontWeight:700,cursor:'pointer'}}>×</div>
        </div>
      )}
      <label style={{cursor:'pointer',display:'block'}}>
        <input type="file" accept="image/*" onChange={subir} style={{display:'none'}}/>
        {u?(
          <div style={{position:'relative',display:'inline-block'}}>
            <img src={u} alt="" onClick={e=>{e.preventDefault();setGrande(true)}}
              style={{width:90,height:90,borderRadius:10,objectFit:'cover',border:'2px solid var(--border)',cursor:'zoom-in',transition:'transform 0.15s'}}
              onMouseEnter={e=>e.target.style.transform='scale(1.06)'}
              onMouseLeave={e=>e.target.style.transform='scale(1)'}/>
            <label style={{position:'absolute',bottom:0,right:0,background:'rgba(0,0,0,0.6)',color:'#fff',fontSize:11,padding:'2px 6px',borderRadius:'0 0 8px 0',cursor:'pointer',lineHeight:'20px'}}>
              ✏️
              <input type="file" accept="image/*" onChange={subir} style={{display:'none'}}/>
            </label>
          </div>
        ):(
          <div style={{width:90,height:90,borderRadius:10,background:'var(--surface2)',border:'2px dashed var(--border)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4}}>
            <span style={{fontSize:28}}>📷</span><span style={{fontSize:10,color:'var(--text3)'}}>Agregar foto</span>
          </div>
        )}
      </label>
      {subiendo&&<div style={{fontSize:11,color:'var(--text3)',textAlign:'center',marginTop:4}}>Subiendo...</div>}
      {err&&<div style={{fontSize:11,color:'var(--rojo)',marginTop:4,maxWidth:90}}>{err}</div>}
    </div>
  )
}

function ModalAdd({tipo,artId,tempId,onClose,onSave}){
  const[items,setItems]=useState([])
  const[selId,setSelId]=useState('')
  const[cantidad,setCantidad]=useState(tipo==='percha'?'1':tipo==='avio'?'1':'')
  const[loading,setLoading]=useState(false)
  const tablaMap={tela:'precios_tela',avio:'precios_avios',percha:'precios_perchas'}
  const insMap={tela:'articulo_telas',avio:'articulo_avios',percha:'articulo_percha'}
  const fkMap={tela:'precio_tela_id',avio:'precio_avio_id',percha:'precio_percha_id'}
  const tabla=tablaMap[tipo],ins=insMap[tipo],fk=fkMap[tipo]
  const titulo={tela:'Agregar tela',avio:'Agregar avío',percha:'Agregar percha'}[tipo]
  useEffect(()=>{getPrecios(tabla,tempId).then(d=>setItems(d.sort((a,b)=>a.nombre.localeCompare(b.nombre))))},[])
  async function guardar(){
    if(!selId)return
    setLoading(true)
    await sb.schema('costos').from(ins).insert({articulo_id:artId,[fk]:selId,cantidad:Number(cantidad)||1})
    setLoading(false);onSave()
  }
  const sel=items.find(i=>i.id===selId)
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header"><div className="modal-title">{titulo}</div><button className="modal-close" onClick={onClose}>×</button></div>
        <div className="modal-body">
          <div className="form-group">
            <label className="form-label">{tipo==='tela'?'Tipo de tela':tipo==='avio'?'Avío':'Percha'}</label>
            <select className="form-select" value={selId} onChange={e=>setSelId(e.target.value)}>
              <option value="">Seleccioná...</option>
              {items.map(i=><option key={i.id} value={i.id}>{i.nombre}{i.precio?' — '+fmt(i.precio):''}{i.unidad?' /'+i.unidad:''}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Cantidad{tipo==='tela'&&sel?' ('+sel.unidad+')':''}</label>
            <input type="number" className="form-input" value={cantidad} onChange={e=>setCantidad(e.target.value)} step="0.01" min="0.01"/>
          </div>
          {sel&&cantidad&&<div style={{padding:'10px 14px',background:'var(--azul-bg)',borderRadius:8,fontSize:14,fontWeight:600}}>
            Total: {fmt(Number(cantidad)*(sel.precio||0))}
          </div>}
        </div>
        <div className="modal-footer">
          <button className="btn btn-outline" style={{flex:1,minHeight:44}} onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" style={{flex:2,minHeight:44}} onClick={guardar} disabled={loading||!selId}>
            {loading?'Guardando...':'✅ Agregar'}
          </button>
        </div>
      </div>
    </div>
  )
}

function ModalNuevoArt({temporada,onClose,onSave,articulos}){
  const lsKey=`ultimoCodigo_${temporada.id}`
  const ultimoGuardado=localStorage.getItem(lsKey)
  const sugerido=ultimoGuardado?String(parseInt(ultimoGuardado)+1):''
  const[codigo,setCodigo]=useState(sugerido)
  const[desc,setDesc]=useState('')
  const[conf,setConf]=useState('')
  const[loading,setLoading]=useState(false)
  const[error,setError]=useState('')

  async function guardar(){
    if(!codigo){setError('El código es obligatorio');return}
    const yaExiste=(articulos||[]).some(a=>a.codigo.trim()===codigo.trim())
    if(yaExiste){setError(`El código ${codigo} ya existe en esta temporada`);return}
    setLoading(true);setError('')
    const{data:nuevo,error:err}=await sb.schema('costos').from('articulos').insert({temporada_id:temporada.id,codigo:codigo.trim(),descripcion:desc,confeccion:Number(conf)||0}).select().single()
    if(err){setError('Error al guardar: '+err.message);setLoading(false);return}
    if(nuevo){
      const{data:percha}=await sb.schema('costos').from('precios_perchas').select('id').eq('temporada_id',temporada.id).ilike('nombre','Percha 300').limit(1).single()
      if(percha) await sb.schema('costos').from('articulo_percha').insert({articulo_id:nuevo.id,precio_percha_id:percha.id,cantidad:1})
      // Guardar último código usado
      if(!isNaN(parseInt(codigo))) localStorage.setItem(lsKey,codigo.trim())
    }
    setLoading(false);onSave()
  }
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header"><div className="modal-title">Nuevo artículo</div><button className="modal-close" onClick={onClose}>×</button></div>
        <div className="modal-body">
          {ultimoGuardado&&<div style={{fontSize:12,color:'var(--text2)',marginBottom:10}}>Último código registrado: <b>{ultimoGuardado}</b></div>}
          <div className="form-group">
            <label className="form-label">Código *</label>
            <input className="form-input" value={codigo} onChange={e=>{setCodigo(e.target.value);setError('')}} autoFocus
              style={{borderColor:error?'var(--rojo)':undefined}}/>
            {error&&<div style={{color:'var(--rojo)',fontSize:12,marginTop:4}}>{error}</div>}
          </div>
          <div className="form-group"><label className="form-label">Descripción</label><input className="form-input" placeholder="Ej: chaleco polar con tapa cierre" value={desc} onChange={e=>setDesc(e.target.value)}/></div>
          <div className="form-group"><label className="form-label">Confección ($)</label><input type="number" className="form-input" placeholder="0" value={conf} onChange={e=>setConf(e.target.value)}/></div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-outline" style={{flex:1,minHeight:44}} onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" style={{flex:2,minHeight:44}} onClick={guardar} disabled={loading||!codigo}>{loading?'Guardando...':'✅ Crear artículo'}</button>
        </div>
      </div>
    </div>
  )
}

const CATEGORIAS=[
  'Pantalones','Calzas','Shorts / Bermudas','Remeras','Musculosas','Blusas',
  'Camisas / Chombas','Vestidos','Soleros','Monos / Kimonos','Camperas',
  'Chalecos','Tapados','Buzos / Sweaters','Polerones','Sacos',
  'Pilotines','Spolverinos','Ponchos','Blazers','Polleras','Conjuntos','Otros'
]

function detectarCategoria(desc){
  if(!desc)return 'Otros'
  const d=desc.toLowerCase()
  if(d.includes('pilotin')||d.includes('piloto')||d.includes('rompeviento'))return 'Pilotines'
  if(d.includes('tapado'))return 'Tapados'
  if(d.includes('campera'))return 'Camperas'
  if(d.includes('poleron')||d.includes('media polera'))return 'Polerones'
  if(d.includes('polera'))return 'Polerones'
  if(d.includes('buzo')||d.includes('sweater')||d.includes('sweter')||d.includes('canguro'))return 'Buzos / Sweaters'
  if(d.includes('saco')||d.includes('cuello polar')||d.includes('cuello peluche'))return 'Sacos'
  if(d.startsWith('capa')||d.includes(' capa '))return 'Sacos'
  if(d.includes('chaleco'))return 'Chalecos'
  if(d.includes('calza'))return 'Calzas'
  if(d.includes('pantalon')||d.includes('palazzo')||d.includes('babucha')||d.includes('jogger'))return 'Pantalones'
  if(d.includes('short')||d.includes('bermuda')||d.includes('capri'))return 'Shorts / Bermudas'
  if(d.includes('vestido'))return 'Vestidos'
  if(d.includes('solero'))return 'Soleros'
  if(d.includes('musculosa'))return 'Musculosas'
  if(d.includes('blusa'))return 'Blusas'
  if(d.includes('remeron')||d.includes('remera')||d.includes('murcielago'))return 'Remeras'
  if(d.includes('chomba')||d.includes('camisa'))return 'Camisas / Chombas'
  if(d.includes('mono')||d.includes('kimono')||d.includes('jardinero'))return 'Monos / Kimonos'
  if(d.includes('poncho'))return 'Ponchos'
  if(d.includes('blazer'))return 'Blazers'
  if(d.includes('spolverino'))return 'Spolverinos'
  if(d.includes('pollera'))return 'Polleras'
  if(d.includes('conjunto'))return 'Conjuntos'
  return 'Otros'
}

function ListaPreciosPage({temporada,config}){
  const[articulos,setArticulos]=useState([])
  const[loading,setLoading]=useState(true)
  const[editandoId,setEditandoId]=useState(null)
  const[editandoCat,setEditandoCatId]=useState(null)
  const[busqueda,setBusqueda]=useState('')

  useEffect(()=>{cargar()},[temporada.id])

  async function cargar(){
    setLoading(true)
    const arts=await getArticulos(temporada.id)
    const con=await Promise.all(arts.map(async a=>{
      const det=await getArticuloDetalle(a.id)
      return{...a,detalle:det,precios:calcPrecios(det,a.confeccion,config)}
    }))
    const sinCat=con.filter(a=>!a.categoria)
    if(sinCat.length){
      await Promise.all(sinCat.map(a=>{
        const cat=detectarCategoria(a.descripcion)
        return sb.schema('costos').from('articulos').update({categoria:cat}).eq('id',a.id)
      }))
      sinCat.forEach(a=>{a.categoria=detectarCategoria(a.descripcion)})
    }
    setArticulos(con)
    setLoading(false)
  }

  async function guardarPrecio(id,valor){
    const v=valor===''?null:Number(valor)
    await sb.schema('costos').from('articulos').update({precio_venta_manual:v}).eq('id',id)
    setArticulos(arts=>arts.map(a=>a.id===id?{...a,precio_venta_manual:v}:a))
    setEditandoId(null)
  }

  async function guardarCategoria(id,cat){
    await sb.schema('costos').from('articulos').update({categoria:cat}).eq('id',id)
    setArticulos(arts=>arts.map(a=>a.id===id?{...a,categoria:cat}:a))
    setEditandoCatId(null)
  }

  async function exportarExcel(){
    const wb=new ExcelJS.Workbook()
    wb.creator='Criterio Costos'
    wb.created=new Date()
    const ws=wb.addWorksheet('Lista de Precios')

    // Anchos de columna: A vacía, B código, C descripción, D-F vacías, G precio, H -10%, I -17%
    ws.columns=[
      {width:3},{width:11},{width:44},{width:4},{width:4},{width:4},{width:13},{width:13},{width:13}
    ]

    const addRow=(vals,opts={})=>{
      const r=ws.addRow(vals)
      if(opts.bold)r.font={bold:true,size:opts.size||11}
      if(opts.size&&!opts.bold)r.font={size:opts.size}
      if(opts.bg){
        r.eachCell({includeEmpty:true},(cell)=>{
          cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:opts.bg}}
        })
      }
      if(opts.border){
        r.eachCell({includeEmpty:false},(cell)=>{
          cell.border={bottom:{style:'thin',color:{argb:'FFB0B0B0'}}}
        })
      }
      if(opts.align){
        r.eachCell({includeEmpty:false},(cell,col)=>{
          cell.alignment={horizontal:col>=7?'right':'left',vertical:'middle'}
        })
      }
      return r
    }

    // Header empresa
    addRow([null,'LAVALLE COMERCIAL S.R.L.']).font={bold:true,size:13}
    addRow([null,'Ecuador 425- Cap. Fed. (2412)']).font={size:10,color:{argb:'FF444444'}}
    addRow([null,'Tel / fax: 4865-0192']).font={size:10,color:{argb:'FF444444'}}
    addRow([null,'E-mail: lavallecom@hotmail.com']).font={size:10,color:{argb:'FF444444'}}
    const titleRow=ws.addRow([null,`LISTA DE PRECIOS ${temporada.nombre.toUpperCase()}`])
    titleRow.font={bold:true,size:12}
    ws.addRow([null,new Date().toLocaleDateString('es-AR')]).font={size:10,color:{argb:'FF666666'}}
    ws.addRow([])

    const border={top:{style:'thin',color:{argb:'FFB0B0B0'}},left:{style:'thin',color:{argb:'FFB0B0B0'}},bottom:{style:'thin',color:{argb:'FFB0B0B0'}},right:{style:'thin',color:{argb:'FFB0B0B0'}}}
    const borderBold={top:{style:'medium',color:{argb:'FF555555'}},left:{style:'medium',color:{argb:'FF555555'}},bottom:{style:'medium',color:{argb:'FF555555'}},right:{style:'medium',color:{argb:'FF555555'}}}

    // Encabezados de columnas
    const hRow=ws.addRow([null,'ARTÍCULO','DESCRIPCIÓN',null,null,null,'PRECIO','-10%','-17%'])
    hRow.font={bold:true,size:11}
    hRow.eachCell({includeEmpty:true},(cell,col)=>{
      cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1A1A18'}}
      cell.font={bold:true,color:{argb:'FFFFFFFF'},size:11}
      cell.alignment={horizontal:col>=7?'right':'left',vertical:'middle'}
      cell.border=borderBold
    })
    hRow.height=22
    ws.addRow([])

    // Grupos
    const grupos2={}
    articulos.forEach(a=>{const cat=a.categoria||'Sin categoría';if(!grupos2[cat])grupos2[cat]=[];grupos2[cat].push(a)})
    const todas=[...[...CATEGORIAS,'Sin categoría'].filter(c=>grupos2[c]),...Object.keys(grupos2).filter(c=>![...CATEGORIAS,'Sin categoría'].includes(c))]

    todas.forEach(cat=>{
      ws.addRow([])
      const catRow=ws.addRow([null,cat.toUpperCase()])
      catRow.font={bold:true,size:11,color:{argb:'FF1A1A18'}}
      catRow.height=18
      catRow.eachCell({includeEmpty:true},(cell)=>{
        cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFE8E8E4'}}
        cell.border=borderBold
      })

      grupos2[cat].forEach((a,i)=>{
        const pv=a.precio_venta_manual!=null?a.precio_venta_manual:(a.precios?.precioVenta||0)
        const gr=Math.round(pv*0.9)
        const su=Math.round(pv*0.83)
        const dRow=ws.addRow([null,a.codigo,a.descripcion||'',null,null,null,pv||null,gr||null,su||null])
        dRow.height=16
        if(i%2===1){
          dRow.eachCell({includeEmpty:true},(cell)=>{
            cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF7F7F5'}}
          })
        }
        dRow.eachCell({includeEmpty:true},(cell)=>{cell.border=border})
        ;[7,8,9].forEach(c=>{
          const cell=dRow.getCell(c)
          cell.alignment={horizontal:'right'}
          if(cell.value) cell.numFmt='#,##0'
        })
        dRow.getCell(2).font={bold:true}
      })
    })

    // Descargar
    const buffer=await wb.xlsx.writeBuffer()
    const blob=new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'})
    const url=URL.createObjectURL(blob)
    const a=document.createElement('a')
    a.href=url
    a.download=`Lista_${temporada.nombre.replace(/ /g,'_')}.xlsx`
    a.click()
    URL.revokeObjectURL(url)
  }

  const filtrados=articulos.filter(a=>!busqueda||a.codigo.toLowerCase().includes(busqueda.toLowerCase())||(a.descripcion||'').toLowerCase().includes(busqueda.toLowerCase()))
  const grupos={}
  filtrados.forEach(a=>{const cat=a.categoria||'Sin categoría';if(!grupos[cat])grupos[cat]=[];grupos[cat].push(a)})
  const catsOrdenadas=[...[...CATEGORIAS,'Sin categoría'].filter(c=>grupos[c]),...Object.keys(grupos).filter(c=>![...CATEGORIAS,'Sin categoría'].includes(c))]

  return(
    <div className="page">
      <div className="page-header">
        <div><div className="page-title">🏷️ Lista de Precios</div><div className="page-sub">{temporada.nombre} · {articulos.length} artículos</div></div>
        <button className="btn btn-primary" onClick={exportarExcel}>⬇️ Exportar Excel</button>
      </div>
      <input className="form-input" placeholder="🔍 Buscar código o descripción..." value={busqueda} onChange={e=>setBusqueda(e.target.value)} style={{marginBottom:16}}/>
      {loading?<div className="loading">⏳ Cargando...</div>:(
        <div style={{display:'flex',flexDirection:'column',gap:20}}>
          {catsOrdenadas.map(cat=>(
            <div key={cat} className="card" style={{overflow:'hidden'}}>
              <div style={{padding:'10px 14px',borderBottom:'1px solid var(--border)',fontWeight:700,fontSize:13,textTransform:'uppercase',letterSpacing:'.5px',color:'var(--text2)',background:'var(--surface2)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span>{cat}</span><span style={{fontWeight:400,fontSize:12}}>{grupos[cat].length} art.</span>
              </div>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead><tr>
                  <th style={{padding:'8px 12px',fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',textAlign:'left',borderBottom:'1px solid var(--border)'}}>Art.</th>
                  <th style={{padding:'8px 12px',fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',textAlign:'left',borderBottom:'1px solid var(--border)'}}>Descripción</th>
                  <th style={{padding:'8px 12px',fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',textAlign:'left',borderBottom:'1px solid var(--border)'}}>Categoría</th>
                  <th style={{padding:'8px 12px',fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',textAlign:'right',borderBottom:'1px solid var(--border)'}}>Precio Venta</th>
                </tr></thead>
                <tbody>
                  {grupos[cat].map(a=>{
                    const pvCalc=a.precios?.precioVenta
                    const pvFinal=a.precio_venta_manual!=null?a.precio_venta_manual:pvCalc
                    const esManual=a.precio_venta_manual!=null
                    return(
                      <tr key={a.id} style={{borderBottom:'1px solid var(--border)'}}>

                        <td style={{padding:'10px 12px'}}>

                              <input type="number" autoFocus defaultValue={pvFinal||''} onBlur={e=>guardarPrecio(a.id,e.target.value)}

          ))}

function PreciosPage({tipo,titulo,icono,temporada}){
  const[items,setItems]=useState([])

  const[editando,setEditando]=useState(null)
  const[modalNuevo,setModalNuevo]=useState(false)
  const[busqueda,setBusqueda]=useState('')
  useEffect(()=>{cargar()},[temporada.id,tipo])
  async function cargar(){setLoading(true);const d=await getPrecios(tipo,temporada.id);setItems(d.sort((a,b)=>a.nombre.localeCompare(b.nombre)));setLoading(false)}
  async function guardarEdit(item,precio){await sb.schema('costos').from(tipo).update({precio:Number(precio)}).eq('id',item.id);setEditando(null);cargar()}
  async function del(id){if(!confirm('¿Eliminar?'))return;await sb.schema('costos').from(tipo).delete().eq('id',id);cargar()}
  const filtrados=items.filter(i=>!busqueda||i.nombre.toLowerCase().includes(busqueda.toLowerCase()))
  return(
    <div className="page">
      <div className="page-header">
        <div><div className="page-title">{icono} {titulo}</div><div className="page-sub">{temporada.nombre} · {items.length} ítems</div></div>
        <button className="btn btn-primary" onClick={()=>setModalNuevo(true)}>+ Agregar</button>
      </div>
      <input className="form-input" placeholder="🔍 Buscar por nombre..." value={busqueda} onChange={e=>setBusqueda(e.target.value)} style={{marginBottom:16}}/>
      {loading?<div className="loading">⏳ Cargando...</div>:filtrados.length===0?(
        <div className="empty"><div className="empty-icon">{icono}</div><div className="empty-title">{busqueda?'Sin resultados':'Sin ítems todavía'}</div></div>
      ):(
        <div className="card" style={{overflow:'hidden'}}>
          {filtrados.map(item=>(
            <div key={item.id} className="precio-item">
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:14}}>{item.nombre}</div>
                {item.unidad&&<div style={{fontSize:11,color:'var(--text3)'}}>por {item.unidad}</div>}
              </div>
              {editando?.id===item.id?(
                <EditInline valor={item.precio} onSave={v=>guardarEdit(item,v)} onCancel={()=>setEditando(null)}/>
              ):(
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <b style={{fontSize:15}}>{fmt(item.precio)}</b>
                  <button className="btn-icon" onClick={()=>setEditando(item)}>✏️</button>
                  <button className="btn-icon" onClick={()=>del(item.id)}>🗑</button>
                </div>
              )}
            </div>
          ))}
        </div>
      )}
      {modalNuevo&&<ModalNuevoPrecio tipo={tipo} titulo={titulo} tempId={temporada.id} onClose={()=>setModalNuevo(false)} onSave={()=>{setModalNuevo(false);cargar()}}/>}
    </div>
  )
}

function EditInline({valor,onSave,onCancel}){
  const[v,setV]=useState(String(valor||''))
  return(
    <div style={{display:'flex',gap:6,alignItems:'center'}}>
      <input type="number" value={v} onChange={e=>setV(e.target.value)} style={{width:100,padding:'5px 8px',border:'1.5px solid var(--azul)',borderRadius:6,fontSize:14,fontWeight:700}} autoFocus onKeyDown={e=>e.key==='Enter'&&onSave(v)}/>
      <button className="btn btn-sm btn-primary" onClick={()=>onSave(v)}>✓</button>
      <button className="btn btn-sm btn-outline" onClick={onCancel}>✕</button>
    </div>
  )
}

function ModalNuevoPrecio({tipo,titulo,tempId,onClose,onSave}){
  const[nombre,setNombre]=useState('')
  const[precio,setPrecio]=useState('')
  const[unidad,setUnidad]=useState('kg')
  const[loading,setLoading]=useState(false)
  const esTela=tipo==='precios_tela'
  async function guardar(){
    if(!nombre)return
    setLoading(true)
    const d={temporada_id:tempId,nombre,precio:Number(precio)||0}
    if(esTela)d.unidad=unidad
    await sb.schema('costos').from(tipo).insert(d)
    setLoading(false);onSave()
  }
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header"><div className="modal-title">Agregar a {titulo}</div><button className="modal-close" onClick={onClose}>×</button></div>
        <div className="modal-body">
          <div className="form-group"><label className="form-label">Nombre</label><input className="form-input" placeholder="Ej: polar" value={nombre} onChange={e=>setNombre(e.target.value)} autoFocus/></div>
          <div className={esTela?'form-row':''}>
            <div className="form-group"><label className="form-label">Precio ($)</label><input type="number" className="form-input" placeholder="0" value={precio} onChange={e=>setPrecio(e.target.value)}/></div>
            {esTela&&<div className="form-group"><label className="form-label">Unidad</label><select className="form-select" value={unidad} onChange={e=>setUnidad(e.target.value)}><option value="kg">kg</option><option value="m">m</option><option value="u">u</option></select></div>}
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-outline" style={{flex:1,minHeight:44}} onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" style={{flex:2,minHeight:44}} onClick={guardar} disabled={loading||!nombre}>{loading?'Guardando...':'✅ Agregar'}</button>
        </div>
      </div>
    </div>
  )
}

function ConfigPage({temporada,config,onSave,temporadas,onTemporadas}){
  const[form,setForm]=useState({precio_corte:config?.precio_corte||400,margen_greguera:config?.margen_greguera||100,margen_balbi:config?.margen_balbi||50,descuento_sucati:config?.descuento_sucati||15,margen_propio:config?.margen_propio??config?.margen_greguera??100})
  const lsKey=`ultimoCodigo_${temporada.id}`
  const[ultimoCod,setUltimoCod]=useState(localStorage.getItem(lsKey)||'')
  const[guardando,setGuardando]=useState(false)
  const[ok,setOk]=useState(false)
  const[mTemp,setMTemp]=useState(false)
  async function guardar(){
    setGuardando(true)
    if(ultimoCod.trim()) localStorage.setItem(lsKey,ultimoCod.trim())
    if(config){const{data}=await sb.schema('costos').from('config').update(form).eq('id',config.id).select().single();onSave(data)}
    else{const{data}=await sb.schema('costos').from('config').insert({...form,temporada_id:temporada.id}).select().single();onSave(data)}
    setGuardando(false);setOk(true);setTimeout(()=>setOk(false),2000)
  }
  const set=(k,v)=>setForm(f=>({...f,[k]:v}))
  const ej=10000
  const pv=round500(ej*(1+form.margen_propio/100))
  const gr=ej*(1+form.margen_greguera/100)
  const ba=ej*(1+form.margen_balbi/100)
  const su=gr*(1-form.descuento_sucati/100)
  return(
    <div className="page">
      <div className="page-header">
        <div><div className="page-title">⚙️ Configuración</div><div className="page-sub">{temporada.nombre}</div></div>
        <button className="btn btn-outline" onClick={()=>setMTemp(true)}>+ Nueva temporada</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,alignItems:'start'}}>
        <div className="card" style={{padding:20}}>
          <div style={{fontWeight:700,marginBottom:16}}>Parámetros globales</div>
          <div className="form-group">
            <label className="form-label">Último código usado</label>
            <input type="number" className="form-input" value={ultimoCod} onChange={e=>setUltimoCod(e.target.value)} placeholder="Ej: 2314"/>
            <div style={{fontSize:11,color:'var(--text3)',marginTop:3}}>
              {ultimoCod?`Próximo artículo: ${parseInt(ultimoCod)+1}`:'Ingresá el último código para que se sugiera el siguiente al crear uno nuevo'}
            </div>
          </div>
          <div className="sep"/>
          <div className="form-group"><label className="form-label">Precio de corte ($)</label><input type="number" className="form-input" value={form.precio_corte} onChange={e=>set('precio_corte',Number(e.target.value))}/><div style={{fontSize:11,color:'var(--text3)',marginTop:3}}>Se aplica a todos los artículos</div></div>
          <div className="sep"/>
          <div className="form-group"><label className="form-label">Margen Precio Venta (%)</label><input type="number" className="form-input" value={form.margen_propio} onChange={e=>set('margen_propio',Number(e.target.value))}/><div style={{fontSize:11,color:'var(--text3)',marginTop:3}}>Tu precio de referencia. Se redondea a múltiplos de $500</div></div>
          <div className="form-group"><label className="form-label">Margen G. Reguera (%)</label><input type="number" className="form-input" value={form.margen_greguera} onChange={e=>set('margen_greguera',Number(e.target.value))}/></div>
          <div className="form-group"><label className="form-label">Margen Balbi (%)</label><input type="number" className="form-input" value={form.margen_balbi} onChange={e=>set('margen_balbi',Number(e.target.value))}/></div>
          <div className="form-group"><label className="form-label">Descuento Sucati (%)</label><input type="number" className="form-input" value={form.descuento_sucati} onChange={e=>set('descuento_sucati',Number(e.target.value))}/></div>
          <button className="btn btn-primary" style={{width:'100%',minHeight:44}} onClick={guardar} disabled={guardando}>{ok?'✅ Guardado':guardando?'Guardando...':'Guardar configuración'}</button>
        </div>
        <div className="card" style={{padding:20}}>
          <div style={{fontWeight:700,marginBottom:16}}>Vista previa (costo $10.000)</div>
          {[{l:'Precio Venta',v:pv,c:'precio-venta'},{l:'G. Reguera',v:gr,c:'precio-greguera'},{l:'Balbi',v:ba,c:'precio-balbi'},{l:'Sucati',v:su,c:'precio-sucati'}].map(p=>(
            <div key={p.l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
              <span style={{fontSize:14,color:'var(--text2)'}}>{p.l}</span>
              <span className={p.c} style={{fontSize:20,fontWeight:800}}>{fmt(p.v)}</span>
            </div>
          ))}
        </div>
      </div>
      {mTemp&&<ModalNuevaTemp onClose={()=>setMTemp(false)} onSave={async nombre=>{
        await sb.schema('costos').from('temporadas').insert({nombre,activa:false})
        const ts=await getTemporadas();onTemporadas(ts);setMTemp(false)
      }}/>}
    </div>
  )
}

function ModalNuevaTemp({onClose,onSave,sugerido}){
  const[nombre,setNombre]=useState(sugerido||'')
  const[loading,setLoading]=useState(false)
  async function guardar(){if(!nombre)return;setLoading(true);await onSave(nombre);setLoading(false)}
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header"><div className="modal-title">Nueva temporada</div><button className="modal-close" onClick={onClose}>×</button></div>
        <div className="modal-body"><div className="form-group"><label className="form-label">Nombre</label><input className="form-input" placeholder="Ej: Verano 2027" value={nombre} onChange={e=>setNombre(e.target.value)} autoFocus/></div></div>
        <div className="modal-footer">
          <button className="btn btn-outline" style={{flex:1,minHeight:44}} onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" style={{flex:2,minHeight:44}} onClick={guardar} disabled={loading||!nombre}>{loading?'Creando...':'✅ Crear temporada'}</button>
        </div>
      </div>
    </div>
  )
}

ReactDOM.render(React.createElement(App),document.getElementById('root'))
</script>
</body>
</html>
